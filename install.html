<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZENTA VPN</title>
<style>
body {
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#0f0f0f;
  color:white;
  font-family:Arial, sans-serif;
}
.box { text-align:center; }
.btn {
  padding:15px 25px;
  background:#00ffaa;
  border-radius:12px;
  text-decoration:none;
  color:black;
  font-weight:bold;
  cursor:pointer;
  display:inline-block;
  margin-top:15px;
}
.notice {
  margin-top:15px;
  font-size:14px;
  opacity:0.7;
}
</style>
<script>
const vpnLink = "https://nettutyru.github.io/zenta-proxy/sub.txt";

// авто-переход через 1.5 секунды
setTimeout(() => {
  window.location.href = "happ://add?url=" + vpnLink;
}, 1500);

// функция для копирования ссылки вручную
function copyAndOpen() {
  navigator.clipboard.writeText(vpnLink).then(() => {
    alert("Ссылка скопирована! Вставь в Happ → Подписки");
    window.location.href = "happ://add?url=" + vpnLink;
  }).catch(() => {
    alert("Не удалось скопировать ссылку, скопируй вручную:\n" + vpnLink);
  });
}
</script>
</head>
<body>
<div class="box">
  <h1>ZENTA VPN</h1>
  <p>Подключение...</p>
  <div class="btn" onclick="copyAndOpen()">Подключить вручную</div>
  <div class="notice">Ссылка автоматически скопируется в буфер обмена</div>
</div>
</body>
</html>
