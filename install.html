<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZENTA VPN</title>
<style>
body {
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#0f0f0f;
  color:white;
  font-family:Arial, sans-serif;
}
.box { text-align:center; width:90%; max-width:400px; }
input {
  padding:10px;
  border-radius:8px;
  border:none;
  width:80%;
  margin-bottom:15px;
}
.btn {
  padding:15px 25px;
  background:#00ffaa;
  border-radius:12px;
  text-decoration:none;
  color:black;
  font-weight:bold;
  cursor:pointer;
  display:inline-block;
}
.notice {
  margin-top:15px;
  font-size:14px;
  opacity:0.7;
}
</style>
<script>
const vpnLink = "https://nettutyru.github.io/zenta-proxy/sub.txt";

// функция проверки номера договора и продолжения
function checkContract() {
  const contract = parseInt(document.getElementById("contract").value);
  if(contract >= 1000 && contract <= 1030) {
    // копирование ссылки и открытие Happ
    navigator.clipboard.writeText(vpnLink).then(() => {
      alert("Номер договора верный! Ссылка скопирована, вставь в Happ → Подписки.");
      window.location.href = "happ://add?url=" + vpnLink;
    }).catch(() => {
      alert("Не удалось скопировать ссылку, скопируй вручную:\n" + vpnLink);
      window.location.href = "happ://add?url=" + vpnLink;
    });
  } else {
    alert("Неверный номер договора!");
  }
}

// авто-переход через 1.5 сек только если номер договора введен вручную
</script>
</head>
<body>
<div class="box">
  <h1>ZENTA VPN</h1>
  <p>Введите номер договора, чтобы подключиться</p>
  <input type="number" id="contract" placeholder="Номер договора:">
  <div class="btn" onclick="checkContract()">Продолжить</div>
  <div class="notice">Ссылка будет скопирована автоматически после проверки.</div>
</div>
</body>
</html>
